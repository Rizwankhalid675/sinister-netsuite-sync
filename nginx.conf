server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Serve the documentation/presentation HTML
    root /var/www/sinister-diesel;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Optional: proxy API health check endpoint
    # location /health {
    #     proxy_pass http://localhost:3000/health;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    # }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Logs
    access_log /var/log/nginx/sinister-diesel-access.log;
    error_log  /var/log/nginx/sinister-diesel-error.log;
}
